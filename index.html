                      {e.objective&&<p style={{fontSize:".82rem",marginBottom:3}}><strong>Objetivo:</strong> {e.objective}</p>}
                      <p style={{fontSize:".82rem",marginBottom:3}}><strong>Conduta:</strong> {e.conduct}</p>
                      {e.response&&<p style={{fontSize:".82rem"}}><strong>Resposta:</strong> {e.response}</p>}
                    </div>
                  ))}
                </div>
              </div>}

              {tab==="documentos"&&<div className="fs"><h4>Relatório Clínico</h4>
                <div className="rp">
                  <div className="rh"><h2>NQ Fono</h2><p style={{fontSize:".77rem",color:"var(--stone)",fontStyle:"italic"}}>Nayara Querino · Fonoaudióloga · CRFa 8-11873 · {todayBR}</p></div>
                  <div className="rs"><h4>Paciente</h4><p>{selPt.name}</p></div>
                  {selPt.specialty&&<div className="rs"><h4>Área Terapêutica</h4><p>{selPt.specialty}</p></div>}
                  {selPt.diagnosis&&<div className="rs"><h4>Hipótese Diagnóstica</h4><p>{selPt.diagnosis}</p></div>}
                  {selPt.eval_diagnosis&&<div className="rs"><h4>Diagnóstico Fonoaudiológico</h4><p>{selPt.eval_diagnosis}</p></div>}
                  {selPt.therapy_plan&&<div className="rs"><h4>Plano Terapêutico</h4><p>{selPt.therapy_plan}</p></div>}
                  {(selPt.evolutions||[]).length>0&&<div className="rs"><h4>Evolução Recente</h4><p><strong>{fmt(selPt.evolutions[0].date)}:</strong> {selPt.evolutions[0].conduct}</p></div>}
                  <div style={{borderTop:"1px solid var(--mist)",paddingTop:16,marginTop:20}}><p style={{fontSize:".76rem",color:"var(--stone)"}}>Nayara Querino · Fonoaudióloga · CRFa 8-11873<br/>Documento confidencial. LGPD.</p></div>
                </div>
                <div style={{marginTop:13,display:"flex",gap:9,flexWrap:"wrap"}}>

<button className="btn bo" onClick={()=>quickAI(`Redija relatório clínico fonoaudiológico para ${selPt.name} (${selPt.specialty||""}). Diagnóstico: ${selPt.eval_diagnosis||selPt.diagnosis||"a confirmar"}. Plano: ${selPt.therapy_plan||"em elaboração"}. Evolução: ${selPt.evolutions?.[0]?.conduct||"em acompanhamento"}.`)}>✨ Gerar com IA</button>
                  <button className="btn bo" onClick={()=>window.print()}>🖨 Imprimir</button>
                </div>
              </div>}
            </div>
          </div>
        )}

        {sec==="agenda"&&<div className="fade-up">
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
            <button className="btn br" onClick={()=>setShowNA(true)}>+ Nova consulta</button>
          </div>
          <div className="card"><div className="card-title">Agendamentos</div>
            {appts.length===0&&<p style={{color:"var(--stone)",fontSize:".84rem"}}>Nenhuma consulta.</p>}
            {appts.map(a=>(
              <div key={a.id} className="ar">
                <span className="at">{a.time}</span>
                <div style={{flex:1}}><strong style={{fontSize:".85rem"}}>{a.patient}</strong><div style={{fontSize:".71rem",color:"var(--stone)"}}>{a.specialty} · {fmt(a.date)}</div></div>
                <div style={{display:"flex",gap:7,alignItems:"center"}}>
                  <span className={`ss ${stCls(a.status)}`}>{a.status}</span>
                  <select className="inp" style={{width:"auto",padding:"4px 8px",fontSize:".72rem"}} value={a.status} onChange={e=>updAppt(a.id,e.target.value)}>
                    {["Pendente","Confirmado","Atendido","Cancelado"].map(s=><option key={s}>{s}</option>)}
                  </select>
                  <button className="btn bsm bd" style={{padding:"4px 8px"}} onClick={()=>delAppt(a.id)}>🗑</button>
                </div>
              </div>
            ))}
          </div>
        </div>}

        {sec==="ia"&&<div className="fade-up">
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">✨ Assistente IA Fonoaudiológico</div>
            <p style={{fontSize:".83rem",color:"var(--stone)",marginBottom:16}}>Uso ilimitado · Especializada em fonoaudiologia · Textos para revisão da Fonoaudióloga.</p>
            <div className="qp">
              {[["📝 Evolução clínica","Escreva modelo de evolução clínica fonoaudiológica para sessão terapêutica infantil com foco em linguagem expressiva e atenção conjunta."],["📄 Relatório profissional","Redija relatório fonoaudiológico completo para encaminhamento multiprofissional."],["👨‍👩‍👧 Devolutiva familiar","Redija devolutiva para responsáveis de paciente com atraso de linguagem, de forma clara e acolhedora."],["🎯 Objetivos terapêuticos","Liste 6 objetivos terapêuticos fonoaudiológicos para disfagia neurogênica leve a moderada."],["🔬 Relatório de avaliação","Redija relatório completo de avaliação fonoaudiológica de linguagem e fala para criança em idade escolar."],["📋 Plano terapêutico","Elabore plano terapêutico fonoaudiológico para paciente adulto com gagueira."]].map(([l,p],i)=>(
                <button key={i} className="qb" onClick={()=>sendAI(p)}>{l}</button>
              ))}
            </div>
          </div>
          <div className="card">
            <div ref={aiRef} className="chat-msgs">
              {aiMsgs.map((m,i)=>(
                <div key={i} className={`msg ${m.role==="user"?"mu":"ma"}`}>
                  {m.role==="assistant"&&<span className="ai-lbl">✨ Assistente IA NQ Fono</span>}
                  {m.content.split("\n").map((l,j)=><span key={j}>{l}<br/></span>)}
                </div>
              ))}
              {aiLoad&&<div className="msg ma"><span className="ai-lbl">✨ Assistente IA NQ Fono</span><div className="ty"><span/><span/><span/></div></div>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <textarea className="inp" style={{flex:1,minHeight:44,maxHeight:110,resize:"vertical"}} placeholder="Descreva o que precisa...
✦✦✦✦✦✦✦✦✦✦✦

" value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAI();}}}/>
              <button className="btn br" style={{alignSelf:"flex-end",padding:"11px 17px"}} onClick={()=>sendAI()} disabled={aiLoad}>{aiLoad?<><span className="sp2"/>...</>:"Enviar"}</button>
            </div>
            <p style={{fontSize:".7rem",color:"var(--mist)",marginTop:6}}>⚠ Textos gerados pela IA devem ser revisados antes do uso clínico.</p>
          </div>
        </div>}

        {sec==="relatorios"&&<div className="fade-up"><div className="card"><div className="card-title">Relatórios Clínicos</div>
          {patients.length===0&&<p style={{color:"var(--stone)",fontSize:".84rem"}}>Nenhum paciente cadastrado.</p>}
          {patients.map(p=>(
            <div key={p.id} className="li">
              <div><strong>📄 {p.name}</strong><span>{p.specialty||"—"} · {p.evolutions?.length||0} evoluções</span></div>
              <div style={{display:"flex",gap:7}}>
                <button className="btn bsm bo" onClick={()=>{setSelPt(p);setSec("prontuario");setTab("documentos")}}>Ver</button>
                <button className="btn bsm bo" onClick={()=>quickAI(`Gere relatório fonoaudiológico para ${p.name} (${p.specialty||""}). Diagnóstico: ${p.eval_diagnosis||p.diagnosis||"em avaliação"}.`)}>✨ IA</button>
              </div>
            </div>
          ))}
        </div></div>}

        {sec==="config"&&<div className="fade-up"><div className="card" style={{maxWidth:500}}>
          <div className="card-title">Configurações</div>
          <div className="fs"><h4>Profissional</h4>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[["Nome","Nayara Querino"],["Registro","CRFa 8-11873"],["E-mail","nayaraqrino@gmail.com"],["Especialidade","Fonoaudiologia"]].map(([l,v])=>(
                <div key={l}><label>{l}</label><input className="inp" defaultValue={v} readOnly style={{opacity:.8}}/></div>
              ))}
            </div>
          </div>
          <div className="dvd"/>
          <div className="fs"><h4>Segurança</h4>
            <div style={{background:"var(--ivory)",borderRadius:"var(--rs)",padding:15,fontSize:".82rem",lineHeight:2}}>
              ☁️ Banco de dados Supabase na nuvem<br/>🔄 Sincronização em tempo real<br/>🛡 Compatível com LGPD<br/>🔒 Sessão segura
            </div>
          </div>
          <div className="dvd"/>
          <div style={{display:"flex",gap:9}}>
            <button className="btn bo" onClick={fetchAll}>🔄 Sincronizar</button>
            <button className="btn bd" onClick={logout}>🚪 Sair</button>
          </div>
        </div></div>}
      </main>

      {showNP&&<div className="ov" onClick={()=>setShowNP(false)}><div className="mo fade-up" onClick={e=>e.stopPropagation()}>
        <h3>Novo Paciente</h3>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {[["name","Nome completo *"],["guardian","Responsável"],["phone","Telefone"],["cpf","CPF (opcional)"],["address","Endereço"],["diagnosis","Hipótese diagnóstica"]].map(([k,l])=>(
            <div key={k}><label>{l}</label><input className="inp" value={newPt[k]||""} onChange={e=>setNewPt({...newPt,[k]:e.target.value})}/></div>
          ))}
          <div><label>Data de nascimento</label><input className="inp" type="date" value={newPt.dob||""} onChange={e=>setNewPt({...newPt,dob:e.target.value})}/></div>
          <div><label>Área de atuação</label><select className="inp" value={newPt.specialty} onChange={e=>setNewPt({...newPt,specialty:e.target.value})}><option value="">Selecione...</option>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div>
        </div>
        <div style={{display:"flex",gap:9,marginTop:20}}>
          <button className="btn br" onClick={saveNewPt} disabled={syncing}>{syncing?"Salvando...":"Cadastrar"}</button>
          <button className="btn bo" onClick={()=>setShowNP(false)}>Cancelar</button>
        </div>
      </div></div>}
✦✦✦✦✦✦✦✦✦✦✦

{showNA&&<div className="ov" onClick={()=>setShowNA(false)}><div className="mo fade-up" onClick={e=>e.stopPropagation()}>
        <h3>Nova Consulta</h3>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div><label>Data</label><input className="inp" type="date" value={newA.date} onChange={e=>setNewA({...newA,date:e.target.value})}/></div>
          <div><label>Horário *</label><input className="inp" type="time" value={newA.time} onChange={e=>setNewA({...newA,time:e.target.value})}/></div>
          <div><label>Paciente *</label><input className="inp" value={newA.patient} onChange={e=>setNewA({...newA,patient:e.target.value})} list="ptl"/><datalist id="ptl">{patients.map(p=><option key={p.id} value={p.name}/>)}</datalist></div>
          <div><label>Especialidade</label><select className="inp" value={newA.specialty} onChange={e=>setNewA({...newA,specialty:e.target.value})}><option value="">Selecione...</option>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div>
          <div><label>Status</label><select className="inp" value={newA.status} onChange={e=>setNewA({...newA,status:e.target.value})}>{["Pendente","Confirmado","Atendido","Cancelado"].map(s=><option key={s}>{s}</option>)}</select></div>
        </div>
        <div style={{display:"flex",gap:9,marginTop:20}}>
          <button className="btn br" onClick={saveAppt} disabled={syncing}>{syncing?"Salvando...":"Agendar"}</button>
          <button className="btn bo" onClick={()=>setShowNA(false)}>Cancelar</button>
        </div>
      </div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
ENDHTML
echo "Done! Size: $(wc -c < /mnt/user-data/outputs/index.html) bytes"
