<!DOCTYPE html>
<html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Clínica Fono</title><link rel='stylesheet' href='styles.css'></head>
<body><div class='container'><header><h1>Clínica Fono</h1><p>Painel profissional</p></header>
<div class='grid'>
<section class='card'><h2>Login</h2><input placeholder='Email'><input placeholder='Senha' type='password'><button>Entrar</button></section>
<section class='card'><h2>Cadastro de Pacientes</h2><input placeholder='Nome'><input placeholder='Idade'><textarea placeholder='Observações'></textarea><button>Salvar</button></section>
<section class='card'><h2>Agenda</h2><ul><li>08:00 - João</li><li>10:00 - Maria</li><li>14:00 - Pedro</li></ul></section>
<section class='card'><h2>Evolução Fonoaudiológica</h2><textarea placeholder='Registrar evolução'></textarea><button>Registrar</button></section>
<section class='card'><h2>Anamnese</h2><textarea placeholder='Histórico do paciente'></textarea></section>
<section class='card'><h2>Financeiro</h2><p>Receitas: R$ 0,00</p><p>Despesas: R$ 0,00</p></section>
</div></div></body></html>
